  name:     Manual
  type:     bool
  display:  toggle
  color:    black
  rw:       w
  log:      true
  graphable:  true
  duplicates:
    significantdate: 900000
    significantvalue: 1
  wireable: true
name:
  leaf:     name
  slot:     name
  name:     Node Name
  type:     text
  display:  text
  rw:       w
  retain:   true
on:
  leaf:     on
  name:     On
  type:     bool
  display:  toggle
  color:    black
  rw:       w
  log:      true
  duplicates:
    significantdate: 900000
    significantvalue: 1
  graphable:  true
